name: Update Fear & Greed Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * 1-5"

permissions:
  contents: write

concurrency:
  group: fear-greed-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Fetch latest snapshot
        run: python scripts/fetch_fear_greed.py

      - name: Commit changes
        id: commit_step
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            data/fear_greed_latest.json \
            data/fear_greed_history.json \
            data/fear_greed_market_history.json \
            data/fear_greed_weekly.json \
            data/fear_greed_fortnightly.json

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update fear & greed snapshot"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Rebase and push
        if: steps.commit_step.outputs.has_changes == 'true'
        run: |
          git pull --rebase origin main
          git push origin HEAD:main
